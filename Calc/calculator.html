<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator — Task 3</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0a1e 0%, #1a0533 50%, #0a1628 100%);
      font-family: 'Inter', sans-serif;
      padding: 2rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      color: #a78bfa;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .calculator {
      width: 340px;
      background: #12062a;
      border: 1px solid #3b1a6e;
      border-radius: 24px;
      padding: 1.5rem;
      box-shadow: 0 32px 80px rgba(124,58,237,.4), 0 0 0 1px rgba(167,139,250,.08);
    }

    /* DISPLAY */
    .display {
      background: #0a0118;
      border: 1px solid #2d1b52;
      border-radius: 14px;
      padding: 1.25rem 1.25rem 1rem;
      margin-bottom: 1.25rem;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      overflow: hidden;
    }
    #expression {
      font-size: .85rem;
      color: #6d4fa0;
      min-height: 1.2rem;
      word-break: break-all;
      text-align: right;
      margin-bottom: .4rem;
    }
    #result {
      font-family: 'Syne', sans-serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: #f0e6ff;
      word-break: break-all;
      text-align: right;
      transition: color .15s;
    }
    #result.error { color: #f87171; font-size: 1.2rem; }

    /* BUTTONS GRID */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: .65rem;
    }

    button {
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      padding: 1rem .5rem;
      transition: transform .1s, opacity .2s;
      line-height: 1;
    }
    button:active { transform: scale(.94); }

    /* Types */
    .btn-num {
      background: #1e0d40;
      color: #e2d9f3;
      border: 1px solid #3b1a6e;
    }
    .btn-num:hover { background: #2a1258; }

    .btn-op {
      background: #4c1d95;
      color: #ddd6fe;
      border: 1px solid #5b21b6;
    }
    .btn-op:hover { background: #5b21b6; }

    .btn-eq {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      border: none;
      box-shadow: 0 4px 16px rgba(124,58,237,.4);
    }
    .btn-eq:hover { opacity: .9; }

    .btn-clear {
      background: #4a0820;
      color: #fca5a5;
      border: 1px solid #7f1d1d;
    }
    .btn-clear:hover { background: #5f0a28; }

    .btn-back {
      background: #1a1a3e;
      color: #a78bfa;
      border: 1px solid #3730a3;
    }
    .btn-back:hover { background: #25255a; }

    .btn-pct {
      background: #1e2d45;
      color: #93c5fd;
      border: 1px solid #1e3a8a;
    }
    .btn-pct:hover { background: #243654; }

    .span2 { grid-column: span 2; }

    /* back button label */
    .btn-back { font-size: 1.2rem; }

    footer { margin-top: 1.5rem; font-size: .75rem; color: #4a2a7a; }

    @media (max-width: 380px) {
      .calculator { width: 300px; }
    }
  </style>
</head>
<body>

  <h1>🧮 Calculator — Task 3</h1>

  <div class="calculator">
    <div class="display">
      <div id="expression"></div>
      <div id="result">0</div>
    </div>

    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-back" onclick="backspace()">⌫</button>
      <button class="btn-pct" onclick="percent()">%</button>
      <button class="btn-op" onclick="appendOp('/')">÷</button>

      <!-- Row 2 -->
      <button class="btn-num" onclick="appendNum('7')">7</button>
      <button class="btn-num" onclick="appendNum('8')">8</button>
      <button class="btn-num" onclick="appendNum('9')">9</button>
      <button class="btn-op" onclick="appendOp('*')">×</button>

      <!-- Row 3 -->
      <button class="btn-num" onclick="appendNum('4')">4</button>
      <button class="btn-num" onclick="appendNum('5')">5</button>
      <button class="btn-num" onclick="appendNum('6')">6</button>
      <button class="btn-op" onclick="appendOp('-')">−</button>

      <!-- Row 4 -->
      <button class="btn-num" onclick="appendNum('1')">1</button>
      <button class="btn-num" onclick="appendNum('2')">2</button>
      <button class="btn-num" onclick="appendNum('3')">3</button>
      <button class="btn-op" onclick="appendOp('+')">+</button>

      <!-- Row 5 -->
      <button class="btn-num span2" onclick="appendNum('0')">0</button>
      <button class="btn-num" onclick="appendDot()">.</button>
      <button class="btn-eq" onclick="calculate()">=</button>
    </div>
  </div>

  <footer>Built with HTML, CSS &amp; JavaScript</footer>

  <script>
    let expression = '';
    let justCalculated = false;

    const exprEl = document.getElementById('expression');
    const resultEl = document.getElementById('result');

    function updateDisplay(val) {
      resultEl.textContent = val;
      resultEl.classList.remove('error');
    }

    function appendNum(n) {
      if (justCalculated) { expression = ''; justCalculated = false; }
      expression += n;
      exprEl.textContent = expression;
      updateDisplay(expression);
    }

    function appendOp(op) {
      justCalculated = false;
      if (expression === '' && op !== '-') return;
      // replace last operator if already ends with one
      if (/[+\-*/]$/.test(expression)) {
        expression = expression.slice(0, -1);
      }
      expression += op;
      exprEl.textContent = expression;
      updateDisplay(expression);
    }

    function appendDot() {
      if (justCalculated) { expression = '0'; justCalculated = false; }
      // find last number segment
      const parts = expression.split(/[+\-*/]/);
      const last = parts[parts.length - 1];
      if (last.includes('.')) return;
      if (last === '') expression += '0';
      expression += '.';
      exprEl.textContent = expression;
      updateDisplay(expression);
    }

    function clearAll() {
      expression = '';
      justCalculated = false;
      exprEl.textContent = '';
      updateDisplay('0');
    }

    function backspace() {
      if (justCalculated) { clearAll(); return; }
      expression = expression.slice(0, -1);
      exprEl.textContent = expression;
      updateDisplay(expression || '0');
    }

    function percent() {
      if (!expression) return;
      try {
        const val = parseFloat(eval(expression));
        expression = String(val / 100);
        exprEl.textContent = expression;
        updateDisplay(expression);
      } catch { showError(); }
    }

    function calculate() {
      if (!expression) return;
      try {
        exprEl.textContent = expression + ' =';
        // safe eval: only allow numbers, operators, dots, parentheses
        if (/[^0-9+\-*/().% ]/.test(expression)) { showError(); return; }
        let result = Function('"use strict"; return (' + expression + ')')();
        if (!isFinite(result)) { showError('Cannot divide by 0'); return; }
        // round floating point
        result = parseFloat(result.toPrecision(12));
        updateDisplay(result);
        expression = String(result);
        justCalculated = true;
      } catch {
        showError();
      }
    }

    function showError(msg = 'Error') {
      resultEl.textContent = msg;
      resultEl.classList.add('error');
      expression = '';
      justCalculated = false;
    }

    // Keyboard support
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') appendNum(e.key);
      else if (e.key === '+') appendOp('+');
      else if (e.key === '-') appendOp('-');
      else if (e.key === '*') appendOp('*');
      else if (e.key === '/') { e.preventDefault(); appendOp('/'); }
      else if (e.key === '.') appendDot();
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Backspace') backspace();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === '%') percent();
    });
  </script>

</body>
</html>
